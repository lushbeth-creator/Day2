<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: After the Install</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.outer{
  border:1px solid #d8dce8;
  border-radius:8px;
  overflow:hidden;
  background:linear-gradient(to bottom,#ffffff 0%,#e8edf8 100%);
}
.panel{padding:26px 24px}

.followup-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
}
@media (max-width:560px){.followup-grid{grid-template-columns:1fr}}

.followup-card{
  background:linear-gradient(to bottom,#ffffff 0%,rgba(93,112,174,0.28) 100%);
  border:1px solid #A6B3D5;border-radius:8px;
  padding:24px 22px;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;
  transition:background .25s ease,transform .25s ease;
}
.followup-card:hover{
  background:linear-gradient(to bottom,#ffffff 0%,rgba(89,163,152,0.32) 100%);
  transform:scale(1.02);
}
.followup-icon{
  width:56px;height:56px;border-radius:50%;background:#5D70AE;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.followup-icon svg{width:26px;height:26px;stroke:#ffffff;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.followup-text{font-size:14.5px;font-weight:700;color:#1B2F5B;line-height:1.5;max-width:340px}
.followup-text b{color:#59A398}
</style>
</head>
<body>

<div class="outer">
  <div class="panel">

    <div class="followup-grid">
      <div class="followup-card">
        <div class="followup-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/><path d="M9 15l2 2 4-4"/></svg>
        </div>
        <div class="followup-text">Check back in on the <b>DAY</b> after install and a <b>WEEK</b> after install to make sure all is well!</div>
      </div>
      <div class="followup-card">
        <div class="followup-icon">
          <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 16 0"/><path d="M4 12v3a2 2 0 0 0 2 2h1v-5H4z"/><path d="M20 12v3a2 2 0 0 1-2 2h-1v-5h3z"/><path d="M18 17v1a3 3 0 0 1-3 3h-2"/></svg>
        </div>
        <div class="followup-text">Set an appointment to come back for a <b>QAR</b> (Quality Assurance Review) <b>4-6 weeks</b> after install</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
